name: simulnote
description: "SimulNote – Smart note-taking for simultaneous interpreters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  perfect_freehand: ^2.5.2+1
  provider: ^6.1.2
  record: any
  http: ^1.2.1
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  pdfrx: ^2.2.24
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
